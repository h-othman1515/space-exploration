<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل...</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #000428, #004e92);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .rocket-container {
            position: relative;
            width: 100px;
            height: 200px;
        }

        .rocket {
            position: absolute;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 100px;
            background: url('rocket.png') no-repeat center center;
            background-size: contain;
            animation: launch 1s ease-in-out forwards; /* تم تقليل مدة الرسوم المتحركة هنا */
        }

        @keyframes launch {
            0% {
                bottom: -200px;
            }

            100% {
                bottom: 100vh;
            }
        }
    </style>
</head>

<body>
    <div class="rocket-container">
        <div class="rocket"></div>
    </div>

    <script>
        // في صفحة loading.html
        setTimeout(() => {
            const nextPage = sessionStorage.getItem('nextPage') || 'index.html';
            window.location.href = nextPage;
        }, 1000); // تم تقليل الوقت إلى 1 ثانية (1000 مللي ثانية)
    </script>
</body>

</html>
